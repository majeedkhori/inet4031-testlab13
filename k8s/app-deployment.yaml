# Refer to the wiki (Part 4b) for the expected value hints
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: ticket-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      containers:
        - name: app
          image: majeedkhori/flask-app:latest
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: db-credentials

---

apiVersion: v1
kind: Service
metadata:
  name: app
  namespace: ticket-app
spec:
  selector:
    app: app
  ports:
    - port: 5000
      targetPort: 5000
