# MariaDB — PersistentVolumeClaim, Deployment, and Service
# INET 4031 Lab 13
# ============================================================
# Fill in each blank marked with # FILL IN
# Refer to the wiki (Part 4a) for the expected value hints
# ============================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: ticket-app
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: ticket-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: mariadb:11
          ports:
            - containerPort: 3306
          envFrom:
            - secretRef:
                name: db-credentials
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/mysql
            - name: db-init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-pvc
        - name: db-init
          configMap:
            name: db-init

---

apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: ticket-app
spec:
  selector:
    app: db
  ports:
    - port: 3306
      targetPort: 3306
