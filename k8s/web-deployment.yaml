# ============================================================
# Apache Web Frontend — Deployment and Service
# INET 4031 Lab 13
# ============================================================
# Fill in each blank marked with # FILL IN
# Refer to the wiki (Part 4c) for the expected value hints
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ticket-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: majeedkhori/apache-web:latest
          ports:
            - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ticket-app
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080       # External port on your VM — http://<VM-IP>:30080
